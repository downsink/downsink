<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>downsink e2e harness</title>
  </head>
  <body>
    <h1>downsink e2e harness</h1>
    <script type="module">
      import * as downsink from '/core/index.js'

      window.downsink = downsink
      // Count entries in the OPFS temp dir, to assert cleanup behavior.
      window.tmpEntries = async () => {
        const root = await navigator.storage.getDirectory()
        try {
          const dir = await root.getDirectoryHandle('.downsink-tmp')
          const names = []
          for await (const name of dir.keys()) names.push(name)
          return names
        } catch {
          return []
        }
      }
      window.ready = true
    </script>
  </body>
</html>
